<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Tobacco Company</title>
    <script>
      (function(){
        var t = localStorage.getItem('theme');
        var dark = false;
        if (t) {
          try {
            var p = JSON.parse(t);
            var r = document.documentElement;
            r.style.setProperty('--beige', p.bg);
            r.style.setProperty('--dark', p.text);
            r.style.setProperty('--theme-accent', p.accent);
            r.style.setProperty('--theme-input-bg', p.inputBg);
            r.style.setProperty('--theme-input-border', p.inputBorder);
            r.classList.add('theme-active');
            if (p.dark) { r.classList.add('theme-dark'); dark = true; }
          } catch(e){}
        }
        var imgs = dark
          ? ['/images/b.jpg', '/images/a.jpg']
          : ['/images/image3.png', '/images/ia.png'];
        imgs.forEach(function(src) {
          var link = document.createElement('link');
          link.rel = 'preload';
          link.as = 'image';
          link.href = src;
          document.head.appendChild(link);
        });
      })();
    </script>
    <link rel="preload" href="/images/image2.jpeg" as="image" />
    <link rel="preload" href="/images/hs.png" as="image" />
    <link rel="preload" href="/images/hoja.png" as="image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin />
    <link rel="preconnect" href="https://db.onlinewebfonts.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="preload" href="https://fonts.cdnfonts.com/css/reforma-1918" as="style" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
